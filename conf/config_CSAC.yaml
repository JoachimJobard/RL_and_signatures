# Main configuration for CSAC (Continuous Soft Actor-Critic) experiments
# Use with: python main_CSAC.py

defaults:
  - agent: CSAC_jax
  - env: delay_jax
  - _self_

# =============================================================================
# Global Settings
# =============================================================================
seed: 42

# =============================================================================
# Evaluation Settings
# =============================================================================
eval:
  x0_test: [1.0, 1.0]     # Initial state for evaluation trajectories
  T_sim: 10.0             # Simulation time for evaluation
  n_eval_trajectories: 5  # Number of different initial conditions to test
  log_interval: 20        # Subsampling for wandb scalar logs

# =============================================================================
# Hydra Configuration
# =============================================================================
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  output_subdir: null

# =============================================================================
# Weights & Biases Configuration
# =============================================================================
wandb:
  project_name: CSAC_Experiments
  entity: null
  mode: online
  name: csac_depth${agent.depth}_lbda${agent.lbda}_${now:%H%M%S}
  group: csac_experiments
