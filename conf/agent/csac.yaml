# CSAC (Continuous Soft Actor-Critic) Agent Configuration

_target_: src.agents.CSAC_jax.CSAC

# =============================================================================
# Training
# =============================================================================
training:
  n_episodes: 500
  max_time: 4.0
  actor_lr: 1e-4
  critic_lr: 1e-3
  scale: 1.0
  clip_gradient: 10.0
  clip_action: 5.0
  divergence_threshold: 10.0
  tau_polyak: 0.05

# =============================================================================
# Discount
# =============================================================================
discount:
  discounted: false
  tau: 100.0

# =============================================================================
# Noise
# =============================================================================
noise:
  sigma: 0.3
  decay: true
  smooth: false
  length_scale: 0.2

# =============================================================================
# Signature
# =============================================================================
signature:
  depth: 3
  window_size: 64
  time_augmentation: true
  state_augmentation: false
  bias: false

# =============================================================================
# Network
# =============================================================================
network:
  hidden_dims: []
  normalize_entries: false
  normalize_sigs: false

# =============================================================================
# Algorithm
# =============================================================================
algorithm:
  semi_gradient: false
  integral_td: false
  fix_initial_state: false
  actor_oracle: false
  critic_oracle: false
  preheat: true
  actor_update_frequency: 1

# =============================================================================
# Replay Buffer
# =============================================================================
replay_buffer:
  capacity: 3000
  batch_size: 64
  n_updates_per_epoch: 256

# =============================================================================
# CSAC-specific
# =============================================================================
lbda: 0.1
